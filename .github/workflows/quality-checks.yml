name: Quality Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  markdown-lint:
    name: Markdown Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Lint Markdown files
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: '**/*.md'
          config: '.markdownlint.yaml'

  link-checker:
    name: Check Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Check links in markdown files
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.markdown-link-check.json'
        continue-on-error: true

  shell-check:
    name: Shell Script Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: '.'
          severity: warning

  yaml-lint:
    name: YAML Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Lint YAML files
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: '.'
          config_file: '.yamllint.yml'
          strict: false

  dockerfile-lint:
    name: Dockerfile Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install hadolint
        run: |
          curl -sL -o hadolint \
            "https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64"
          chmod +x hadolint

      - name: Run hadolint (excluding third-party Dockerfiles)
        run: |
          find . -name 'Dockerfile*' ! -path '*/ecsdemo-*' \
            -exec ./hadolint --ignore DL3008 {} +

  file-structure:
    name: Validate Repository Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Check required files
        run: |
          echo "Checking repository structure..."

          if [ ! -f "LICENSE" ]; then
            echo "LICENSE file missing"
            exit 1
          fi
          echo "LICENSE found"

          if [ ! -f "README.md" ]; then
            echo "README.md missing"
            exit 1
          fi
          echo "README.md found"

          if [ ! -f ".gitignore" ]; then
            echo ".gitignore missing"
            exit 1
          fi
          echo ".gitignore found"

          for dir in */; do
            if [[ "$dir" == .* ]] || [[ "$dir" == "node_modules/" ]]; then
              continue
            fi

            if [ ! -f "${dir}README.md" ]; then
              echo "WARNING: ${dir} missing README.md"
            else
              echo "${dir}README.md found"
            fi
          done

          echo "Repository structure validation complete"

  readme-quality:
    name: README Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Check README content
        run: |
          if ! grep -q "## " README.md; then
            echo "WARNING: README.md should have sections (##)"
          fi

          if ! grep -q "!\[" README.md; then
            echo "WARNING: README.md should have badges"
          fi

          if ! grep -q -i "author\|created by" README.md; then
            echo "WARNING: README.md should have author information"
          fi

          if ! grep -q -i "license" README.md; then
            echo "WARNING: README.md should mention license"
          fi

          echo "README quality check complete"

  actions-security:
    name: Actions Security (zizmor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install zizmor
        run: |
          tmpdir="$(mktemp -d)"
          curl -fsL https://github.com/woodruffw/zizmor/releases/latest/download/zizmor-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz -C "$tmpdir"
          sudo mv "$tmpdir/zizmor" /usr/local/bin/zizmor

      - name: Run zizmor
        run: zizmor .github/workflows/

  prose-lint:
    name: Prose Linting (Vale)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Vale
        env:
          VALE_VERSION: "3.13.1"
        run: |
          curl -sfL "https://github.com/errata-ai/vale/releases/download/v${VALE_VERSION}/vale_${VALE_VERSION}_Linux_64-bit.tar.gz" \
            | tar xz -C /usr/local/bin vale

      - name: Sync Vale packages
        run: vale sync

      - name: Run Vale
        run: |
          find . -name '*.md' ! -path '*/ecsdemo-*' ! -path '*/node_modules/*' ! -path '*/styles/*' \
            -exec vale {} +
