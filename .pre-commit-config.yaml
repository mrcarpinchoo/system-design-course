repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: |
          (?x)^(
            01-introduction-horizontal-scalability/ecsdemo-.*/kubernetes/.*|
            01-introduction-horizontal-scalability/ecsdemo-.*/copilot/.*
          )$
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1024']
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-symlinks
      - id: check-case-conflict
      - id: no-commit-to-branch
        args: ['--branch', 'main']

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: package-lock.json

  - repo: local
    hooks:
      - id: gitleaks
        name: gitleaks
        entry: gitleaks git --pre-commit --redact --no-banner
        language: system
        pass_filenames: false

  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck
        entry: shellcheck --severity=warning
        language: system
        types: [shell]
      - id: shellharden
        name: shellharden
        entry: shellharden --check
        language: system
        types: [shell]

  - repo: local
    hooks:
      - id: hadolint
        name: hadolint
        entry: hadolint
        language: system
        files: Dockerfile
        exclude: |
          (?x)^(
            01-introduction-horizontal-scalability/ecsdemo-.*
          )$
      - id: docker-compose-check
        name: docker-compose-check
        entry: bash -c 'for f; do docker compose -f "$f" config --quiet; done' --
        language: system
        files: docker-compose\.yml$
        exclude: |
          (?x)^(
            01-introduction-horizontal-scalability/ecsdemo-.*
          )$

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.47.0
    hooks:
      - id: markdownlint
        args: ['--fix']

  - repo: local
    hooks:
      - id: vale
        name: vale
        entry: bash -c 'vale sync --no-progress 2>/dev/null; vale "$@"' --
        language: system
        types: [markdown]

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.11
    hooks:
      - id: actionlint

  - repo: local
    hooks:
      - id: zizmor
        name: zizmor
        entry: zizmor --config zizmor.yml .github/workflows/
        language: system
        files: ^\.github/workflows/.*\.ya?ml$
        pass_filenames: false

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
