services:
  cass1:
    image: cassandra:4.1
    container_name: cass1
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: university-cluster
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack1
      CASSANDRA_SEEDS: cass1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
    volumes:
      - cass1-data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'SELECT now() FROM system.local' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  cass2:
    image: cassandra:4.1
    container_name: cass2
    environment:
      CASSANDRA_CLUSTER_NAME: university-cluster
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack2
      CASSANDRA_SEEDS: cass1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
    volumes:
      - cass2-data:/var/lib/cassandra
    depends_on:
      cass1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'SELECT now() FROM system.local' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  cass3:
    image: cassandra:4.1
    container_name: cass3
    environment:
      CASSANDRA_CLUSTER_NAME: university-cluster
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack3
      CASSANDRA_SEEDS: cass1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
    volumes:
      - cass3-data:/var/lib/cassandra
    depends_on:
      cass2:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'SELECT now() FROM system.local' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

volumes:
  cass1-data:
  cass2-data:
  cass3-data:
