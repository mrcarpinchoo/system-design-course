language: en-US
reviews:
  auto_review:
    enabled: true
    drafts: false
  path_instructions:
    - path: "**/*.sh"
      instructions: >
        Review for shell scripting best practices, proper error handling,
        and shellcheck/shellharden compliance.
    - path: ".github/workflows/**"
      instructions: >
        Review for GitHub Actions security best practices, pinned action
        versions, and least-privilege permissions.
    - path: "**/README.md"
      instructions: >
        Review for clarity, completeness of learning objectives, accurate
        technology and concept listings, and reproducibility of steps.
    - path: "[0-1][0-9]-*/**"
      instructions: >
        Review lab content for technical accuracy, clear step-by-step
        instructions, and educational value. Flag any steps that may
        not work in a standard AWS Free Tier environment.
    - path: "shared/presentation/**"
      instructions: >
        Shared presentation template. Changes affect ALL module presentations.
        Review CSS for WCAG AA contrast compliance, review JS for browser
        compatibility (no ES modules, must work on file://). Verify theme
        variables are consistent between dark and light modes.
    - path: "**/presentation/index.html"
      instructions: >
        Module presentation. Verify proper script loading order (slides.js,
        then reveal.js CDN, then presenter.js). Check that all img src paths
        use relative paths to shared/presentation/assets/. Ensure bilingual
        content has both lang-en and lang-es spans.
  path_filters:
    - "!**/screenshots/**"
    - "!**/*.gif"
    - "!**/*.png"
    - "!package-lock.json"
chat:
  auto_reply: true
